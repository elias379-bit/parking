<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Estacionamiento Inteligente</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .tabs { margin-top: 20px; }
        .tab-button {
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            outline: none;
            margin-right: 2px;
            border-radius: 5px 5px 0 0;
        }
        .tab-button.active { background: #666; }
        .tab-content { display: none; margin-top: 0; }
        .tab-content.active { display: block; }

        table {
            border-collapse: collapse;
            width: 80%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th { background: #444; color: white; }

        /* MAPA ESTACIONAMIENTO */
        .mapa {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .espacio {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 15px;
            font-size: 24px;
            transition: background-color 0.5s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .libre { background-color: green; }
        .ocupado { background-color: red; }

        #totalOcupacion {
            margin-top: 10px;
            padding: 10px;
            background: #eee;
            font-size: 18px;
            width: 300px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Estacionamiento Inteligente</h1>

<div class="tabs">
    <button class="tab-button active" onclick="abrirTab('tablaTab')">Tabla</button>
    <button class="tab-button" onclick="abrirTab('mapaTab')">Mapa</button>
</div>

<div id="tablaTab" class="tab-content active">
    <h2>Desocupaciones en tiempo real</h2>

    <!-- NUEVO DIV SOLICITADO -->
    <div id="totalOcupacion">Tiempo total de ocupación: 0 min</div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cajón</th>
                <th>Hora ocupado</th>
                <th>Hora desocupado</th>
                <th>Tiempo total (min)</th>
            </tr>
        </thead>
        <tbody id="tabla"></tbody>
    </table>
</div>

<div id="mapaTab" class="tab-content">
    <h2>Mapa de Estacionamiento</h2>
    <div class="mapa">
        <div id="esp1" class="espacio libre">1</div>
        <div id="esp2" class="espacio libre">2</div>
        <div id="esp3" class="espacio libre">3</div>
        <div id="esp4" class="espacio libre">4</div>
    </div>
</div>

<script>
function abrirTab(tabId) {
    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));

    document.querySelector(`[onclick="abrirTab('${tabId}')"]`).classList.add('active');
    document.getElementById(tabId).classList.add('active');
}

// Actualiza la tabla histórica
async function actualizarTabla() {
    try {
        const res = await fetch("http://localhost:3000/api/desocupaciones");
        const datos = await res.json();

        const tbody = document.getElementById("tabla");
        const totalDiv = document.getElementById("totalOcupacion");

        tbody.innerHTML = "";

        // SUMA DE TODOS LOS TIEMPOS
        let total = 0;

        datos.forEach(row => {
            const minutos = Math.round(row.tiempo_total / 60);
            total += minutos;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${row.id}</td>
                <td>${row.espacio}</td>
                <td>${row.hora_ocupado}</td>
                <td>${row.hora_desocupado}</td>
                <td>${minutos}</td>
            `;
            tbody.appendChild(tr);
        });

        // Mostrar el total arriba de la tabla
        totalDiv.textContent = "Tiempo total de ocupación: " + total + " min";

    } catch(e) {
        console.error("Error al actualizar tabla:", e);
    }
}

// Actualiza el mapa según estado actual
async function actualizarMapa() {
    try {
        const res = await fetch("http://localhost:3000/api/estado");
        const datos = await res.json();

        for (let i = 0; i < 4; i++) {
            const div = document.getElementById(`esp${i+1}`);
            if (datos.espacios[i]) {
                div.classList.remove('libre');
                div.classList.add('ocupado');
            } else {
                div.classList.remove('ocupado');
                div.classList.add('libre');
            }
        }
    } catch(e) {
        console.error("Error al actualizar mapa:", e);
    }
}

// Actualización periódica cada 1 segundo
setInterval(() => {
    actualizarTabla();
    actualizarMapa();
}, 1000);

// Llamada inicial
actualizarTabla();
actualizarMapa();
</script>

</body>
</html>
